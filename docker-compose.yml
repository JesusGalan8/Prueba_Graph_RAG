
# ============================================================
#  F1 GraphRAG — Docker Compose
#  Servicios: Neo4j | Langfuse | API Python
#
#  NOTA: Ollama corre en el HOST Windows (no en Docker).
#  Los contenedores acceden a él via host.docker.internal:11434
# ============================================================

services:

  # ─────────────────────────────────────
  #  Graph Database
  # ─────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: f1_neo4j
    ports:
      - "7474:7474"   # Browser UI  → http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/f1graphrag2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - f1net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p f1graphrag2024 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ─────────────────────────────────────
  #  Observabilidad — Langfuse
  # ─────────────────────────────────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: f1_langfuse_db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    networks:
      - f1net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: f1_langfuse
    ports:
      - "3001:3000"   # Dashboard → http://localhost:3001
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=f1graphrag-nextauth-secret-2024
      - SALT=f1graphrag-salt-2024
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - f1net

  # ─────────────────────────────────────
  #  API Python + CLI
  #  Ollama → host.docker.internal:11434
  # ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_api
    ports:
      - "8001:8000"   # FastAPI → http://localhost:8001/docs
    environment:
      # Neo4j (dentro de la red Docker)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=f1graphrag2024
      # Ollama en el HOST Windows (no en Docker)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_LLM_MODEL=llama3.1:8b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      # Langfuse (rellenar tras crear cuenta en http://localhost:3001)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-not-set}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-not-set}
      - LANGFUSE_BASE_URL=http://langfuse:3000
      # Rango de temporadas
      - SEASON_START=2014
      - SEASON_END=2024
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Necesario en Linux; en Docker Desktop para Windows ya está disponible
    networks:
      - f1net
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./eval:/app/eval
    stdin_open: true
    tty: true

# ─────────────────────────────────────
#  Volúmenes y Red
# ─────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  langfuse_pg_data:

networks:
  f1net:
    driver: bridge
